name: Notion Swipefile Update

on:
  push:
    branches: [main]
    paths:
      - 'briefs/**'

jobs:
  notion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Save posts to Notion
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os, re, subprocess
          from datetime import date

          TOKEN = os.environ['NOTION_TOKEN']
          DB_ID = os.environ['NOTION_DATABASE_ID']
          TODAY = date.today().isoformat()

          diff = subprocess.check_output(
              ['git', 'diff', 'HEAD~1', 'HEAD', '--', 'briefs/'], text=True)
          new_lines = [l[1:] for l in diff.split('
') if l.startswith('+') and not l.startswith('+++')]
          content = '
'.join(new_lines)

          posts = []
          for block in content.split('
---
'):
              def get(field, b=block):
                  m = re.search(rf'\*\*{field}:\*\*\s*(.+)', b)
                  return m.group(1).strip() if m else ''
              hook = get('Hook')
              if not hook:
                  continue
              posts.append({
                  'hook': hook,
                  'template': get('Template'),
                  'why': get('Why it worked'),
                  'engagement': get('Engagement'),
                  'author': get('Author'),
                  'source': get('Source') or None,
              })

          def create_page(p):
              body = {
                  'parent': {'database_id': DB_ID},
                  'properties': {
                      'Hook': {'title': [{'text': {'content': p['hook'][:2000]}}]},
                      'Date': {'date': {'start': TODAY}},
                      'Template': {'rich_text': [{'text': {'content': p['template'][:2000]}}]},
                      'Why it worked': {'rich_text': [{'text': {'content': p['why'][:2000]}}]},
                      'Engagement': {'rich_text': [{'text': {'content': p['engagement']}}]},
                      'Author': {'rich_text': [{'text': {'content': p['author']}}]},
                  }
              }
              if p['source']:
                  body['properties']['Source'] = {'url': p['source']}
              data = json.dumps(body).encode()
              req = urllib.request.Request(
                  'https://api.notion.com/v1/pages', data=data,
                  headers={
                      'Authorization': f'Bearer {TOKEN}',
                      'Content-Type': 'application/json',
                      'Notion-Version': '2022-06-28'
                  })
              res = urllib.request.urlopen(req)
              return json.loads(res.read().decode()).get('id')

          print(f'Writing {len(posts)} posts to Notion...')
          for i, p in enumerate(posts, 1):
              create_page(p)
              print(f'  Created {i}/{len(posts)}: {p["hook"][:60]}')
          PYEOF
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
