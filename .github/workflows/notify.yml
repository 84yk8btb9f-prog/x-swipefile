name: Telegram Notify on Swipefile Update

on:
  push:
    branches: [main]
    paths:
      - 'briefs/**'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Send brief to Telegram
        run: |
          python3 << 'PYEOF'
          import urllib.request, urllib.parse, json, os, glob

          BOT_TOKEN = os.environ['BOT_TOKEN']
          CHAT_ID = os.environ['CHAT_ID']

          def send(text):
              data = urllib.parse.urlencode({'chat_id': CHAT_ID, 'text': text}).encode()
              req = urllib.request.Request(
                  f'https://api.telegram.org/bot{BOT_TOKEN}/sendMessage', data=data)
              res = urllib.request.urlopen(req)
              result = json.loads(res.read().decode())
              if not result.get('ok'):
                  print('Error:', result)
                  raise SystemExit(1)

          briefs = sorted(glob.glob('briefs/*.md'))
          if not briefs:
              print('No briefs found'); raise SystemExit(1)
          brief_path = briefs[-1]
          date = os.path.basename(brief_path).replace('-viral-hooks.md', '')
          content = open(brief_path).read()

          sections = content.split('\n---\n')

          MAX = 4000
          chunks = []
          current = f"Daily Swipe Brief — {date}\n\n"
          for section in sections:
              section = section.strip()
              if not section:
                  continue
              block = section + '\n\n---\n\n'
              if len(current) + len(block) > MAX:
                  if current.strip():
                      chunks.append(current.strip())
                  current = block
              else:
                  current += block
          if current.strip():
              chunks.append(current.strip())

          print(f'Sending {len(chunks)} messages...')
          for i, chunk in enumerate(chunks, 1):
              send(chunk)
              print(f'Sent message {i}/{len(chunks)}')
          PYEOF
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
