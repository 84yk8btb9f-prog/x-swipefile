name: Telegram Notify on Swipefile Update

on:
  push:
    branches: [main]
    paths:
      - 'briefs/**'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Send brief to Telegram
        run: |
          python3 << 'PYEOF'
          import urllib.request, urllib.parse, json, os, re, subprocess

          BOT_TOKEN = os.environ['BOT_TOKEN']
          CHAT_ID = os.environ['CHAT_ID']

          def send(text):
              data = urllib.parse.urlencode({'chat_id': CHAT_ID, 'text': text}).encode()
              req = urllib.request.Request(
                  f'https://api.telegram.org/bot{BOT_TOKEN}/sendMessage', data=data)
              res = urllib.request.urlopen(req)
              result = json.loads(res.read().decode())
              if not result.get('ok'):
                  print('Error:', result)
                  raise SystemExit(1)

          def strip_md(text):
              text = re.sub(r'^#{1,3}\s+', '', text, flags=re.MULTILINE)
              text = re.sub(r'\*\*([^*]+)\*\*', r'\1', text)
              return text

          diff = subprocess.check_output(
              ['git', 'diff', 'HEAD~1', 'HEAD', '--', 'briefs/'], text=True)
          new_lines = [l[1:] for l in diff.split('\n') if l.startswith('+') and not l.startswith('+++')]
          content = '\n'.join(new_lines).strip()
          if not content:
              print('No new content'); raise SystemExit(0)
          content = strip_md(content)

          sections = content.split('\n---\n')
          MAX = 4000
          chunks = []
          current = ''
          for section in sections:
              section = section.strip()
              if not section:
                  continue
              block = section + '\n\n---\n\n'
              if len(current) + len(block) > MAX:
                  if current.strip():
                      chunks.append(current.strip())
                  current = block
              else:
                  current += block
          if current.strip():
              chunks.append(current.strip())
          if not chunks:
              print('Nothing to send'); raise SystemExit(0)

          print(f'Sending {len(chunks)} messages...')
          for i, chunk in enumerate(chunks, 1):
              send(chunk)
              print(f'Sent {i}/{len(chunks)}')
          PYEOF
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  notion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Save posts to Notion
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os, re, subprocess
          from datetime import date

          TOKEN = os.environ['NOTION_TOKEN']
          DB_ID = os.environ['NOTION_DATABASE_ID']
          TODAY = date.today().isoformat()

          diff = subprocess.check_output(
              ['git', 'diff', 'HEAD~1', 'HEAD', '--', 'briefs/'], text=True)
          new_lines = [l[1:] for l in diff.split('\n') if l.startswith('+') and not l.startswith('+++')]
          content = '\n'.join(new_lines)

          posts = []
          for block in content.split('\n---\n'):
              def get(field, b=block):
                  m = re.search(rf'\*\*{field}:\*\*\s*(.+)', b)
                  return m.group(1).strip() if m else ''
              hook = get('Hook')
              if not hook:
                  continue
              posts.append({
                  'hook': hook,
                  'template': get('Template'),
                  'why': get('Why it worked'),
                  'engagement': get('Engagement'),
                  'author': get('Author'),
                  'source': get('Source') or None,
              })

          def create_page(p):
              body = {
                  'parent': {'database_id': DB_ID},
                  'properties': {
                      'Hook': {'title': [{'text': {'content': p['hook'][:2000]}}]},
                      'Date': {'date': {'start': TODAY}},
                      'Template': {'rich_text': [{'text': {'content': p['template'][:2000]}}]},
                      'Why it worked': {'rich_text': [{'text': {'content': p['why'][:2000]}}]},
                      'Engagement': {'rich_text': [{'text': {'content': p['engagement']}}]},
                      'Author': {'rich_text': [{'text': {'content': p['author']}}]},
                  }
              }
              if p['source']:
                  body['properties']['Source'] = {'url': p['source']}
              data = json.dumps(body).encode()
              req = urllib.request.Request(
                  'https://api.notion.com/v1/pages', data=data,
                  headers={
                      'Authorization': f'Bearer {TOKEN}',
                      'Content-Type': 'application/json',
                      'Notion-Version': '2022-06-28'
                  })
              res = urllib.request.urlopen(req)
              return json.loads(res.read().decode()).get('id')

          print(f'Writing {len(posts)} posts to Notion...')
          for i, p in enumerate(posts, 1):
              create_page(p)
              print(f'  Created {i}/{len(posts)}: {p["hook"][:60]}')
          PYEOF
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
