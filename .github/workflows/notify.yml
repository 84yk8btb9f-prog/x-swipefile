name: Telegram Notify on Swipefile Update

on:
  push:
    branches: [main]
    paths:
      - 'briefs/**'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get latest brief
        id: brief
        run: |
          LATEST=$(ls briefs/*.md 2>/dev/null | sort | tail -1)
          if [ -z "$LATEST" ]; then echo "No briefs found"; exit 1; fi
          DATE=$(basename "$LATEST" -viral-hooks.md)
          CONTENT=$(head -80 "$LATEST")
          MSG=$(printf "Daily Swipe Brief - %s\nNiches: Indie Hacking, Claude Code, AI, Vibe Coding\n\n%s\n\nFull archive: github.com/84yk8btb9f-prog/x-swipefile" "$DATE" "$CONTENT")
          MSG="${MSG:0:3800}"
          echo "message<<ENDOFMSG" >> $GITHUB_OUTPUT
          echo "$MSG" >> $GITHUB_OUTPUT
          echo "ENDOFMSG" >> $GITHUB_OUTPUT

      - name: Send Telegram message
        run: |
          python3 -c "
          import urllib.request, urllib.parse, json, os
          msg = os.environ['MSG']
          data = urllib.parse.urlencode({
            'chat_id': os.environ['CHAT_ID'],
            'text': msg
          }).encode()
          req = urllib.request.Request(
            'https://api.telegram.org/bot' + os.environ['BOT_TOKEN'] + '/sendMessage',
            data=data
          )
          res = urllib.request.urlopen(req)
          result = json.loads(res.read().decode())
          print('ok:', result.get('ok'))
          if not result.get('ok'):
              print('Error:', result)
              exit(1)
          "
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MSG: ${{ steps.brief.outputs.message }}
